name: latercia
description: Sistema POS local para LaTercia
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: ^2.9.0

  # State management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0

  # Window management
  window_manager: ^0.5.1
  screen_retriever: ^0.2.0

  # UI / Charts
  fl_chart: ^0.68.0
  flex_color_picker: ^3.5.0

  # File handling / backup
  file_picker: ^8.0.7
  path_provider: ^2.1.3
  path: ^1.9.0
  # Exportación de tablas a Excel (módulo de Backups, pantalla admin) — export
  # únicamente, no se usa para importar/restaurar (eso sigue siendo solo .db).
  excel: ^4.0.6

  # Audio alerts (KDS)
  audioplayers: ^6.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  csv: ^6.0.0
  clipboard: ^0.1.3
  crypto: ^3.0.3

  # Impresión térmica ESC/POS + envío RAW al spooler de Windows (USB)
  esc_pos_utils_plus: ^2.0.0
  win32: ^5.5.0
  ffi: ^2.1.0
  # Decodificar/reescalar el logo para imprimirlo en el ticket térmico (ya
  # era dependencia transitiva de esc_pos_utils_plus; se declara directa
  # porque usamos su API — decodeImage/copyResize — sin pasar por ella).
  image: ^4.3.0

  # Impresión gráfica (modo 'grafica'): render del ticket a PDF y envío a
  # cualquier impresora de Windows (inyección, láser, térmica-con-driver).
  pdf: ^3.11.0
  printing: ^5.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/chime_new_order.mp3
    - assets/sounds/chime_order_done.mp3
    - assets/images/logo-color.png
    - assets/images/logo-white.png
    - assets/images/8.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: DM Serif Display
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
        - asset: assets/fonts/DMSerifDisplay-Italic.ttf
          style: italic
